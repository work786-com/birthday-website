<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise 🔒</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="password.css">

</head>

<body>

<!-- Floating Background -->

<div class="hearts"></div>

<div class="sparkles"></div>


<!-- Main Card -->

<div class="container">

<div class="glass-card">

<div class="lock-icon">

    <img
        src="/images/Muqeet.jpg"
        alt="Muqeet"
    >

</div>

<h1>

Happy Birthday Surprise

</h1>

<h2>

Only My Special Person

Can Open This Surprise ❤️

</h2>

<p>

Please enter the secret password.

</p>

<!-- Password Box -->

<div class="input-box">

<input

type="password"

id="password"

placeholder="Enter Secret Password"

autocomplete="off"

>

<button

id="togglePassword"

type="button">

👁️

</button>

</div>

<!-- Error -->

<p id="errorText"></p>

<!-- Unlock Button -->

<button id="unlockBtn">

✨ Unlock ✨

</button>

<!-- Loading -->

<div id="loadingBox">

<div class="loader"></div>

<p>

Unlocking Surprise...

</p>

</div>
<p class="hosted-by">

    ✨ A Surprise Crafted by Muqeet ❤️

</p>
</div>

</div>


<script src="password.js"></script>

</body>

</html>
