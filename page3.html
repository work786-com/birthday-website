<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<link rel="stylesheet" href="page3.css">

</head>

<body>

<!-- Floating Background -->

<div class="hearts"></div>
<div class="sparkles"></div>

<!-- Music Button -->

<header class="top-bar">

<button class="back-btn" onclick="window.location.href='page2.html'">

← Back

</button>

<button id="musicBtn">

🎵 Music

</button>
 </header>
<!-- Main -->

<section class="container">

<div class="card">

<h3>

🎀 A Little Surprise For You 🎀

</h3>

<h1>

Sanober ❤️

</h1>

<p class="subtitle">

Tap the gift and open your surprise...

</p>

<!-- Gift Box -->

<div class="gift-area">

<img

id="giftBox"

class="gift-box"

src="/box.png"

alt="Gift Box"

>

<p class="tap-text">

🎁 Tap The Gift

</p>

</div>

<!-- Hidden Surprise -->

<div id="surpriseContent" class="surprise-content">

<!-- Bears -->

<div class="bear-box">

<img

class="bear-img"

src="/bear.jpg"

alt="Cute Bears"

>

</div>

<!-- Photo -->

<div class="photo-frame">

<img

src="/home.jpg"

id="userPhoto"

alt="Photo"

>

</div>

<h2>

Happy Birthday ❤️

</h2>

<p>

May Allah always keep you smiling,

healthy and successful.

You deserve all the happiness in the world.

🎂✨

</p>

<a

href="page4.html"

id="wishBtn"

class="wish-btn"

>

💋 Surprise Wish Message 😙

</a>

</div>

<!-- Open Button -->

<button id="openBtn">

🎁 Open Surprise

</button>

</div>

</section>

<audio id="bgMusic" loop>
    <source src="/Happy Birthday.mp3" type="audio/mpeg">
</audio>

<script src="music.js"></script>
<script src="page3.js"></script>

</body>




</html>
