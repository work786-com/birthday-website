<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>A Letter From My Heart ❤️</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Great+Vibes&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="page4.css">

</head>

<body>

<!-- Floating Effects -->

<div class="hearts"></div>

<div class="sparkles"></div>

<!-- Music + Back btn -->

<header class="top-bar">

    <button class="back-btn" onclick="window.location.href='page3.html'">
        ← Back
    </button>

    <button id="musicBtn">
        🎵 Music
    </button>

</header>

<!-- Book -->

<section class="container">

<div class="book">

<div class="book-cover">

<h3>

💖

A Letter

For

</h3>

<h1>

Sanober ❤️

</h1>

<p>

Open My Heart...

</p>

<button id="openBook">

📖 Open Letter

</button>

</div>

<!-- Letter -->

<div
id="letterPage"
class="letter-page">

<div class="top">

🐻🤍

</div>

<h2>

Happy Birthday Sanober❤️

</h2>

<!-- Typewriter Message -->

<div id="message" class="message"></div>


<!-- Read Again -->

<button
id="readAgain"
class="again-btn">

💌 Read Again

</button>

<div class="ending">

🌹

Forever & Always

❤️

</div>

</div>

</div>

</section>
<audio id="bgMusic" loop>
    <source src="Happy Birthday.mp3" type="audio/mpeg">
</audio>


<script src="music.js"></script>
<script src="message.js"></script>
<script src="page4.js"></script>

</body>

</html>
